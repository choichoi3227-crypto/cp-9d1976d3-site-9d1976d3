# CloudPress WordPress Worker 배포 설정
# PHP_RUNNER Service Binding으로 즉시 WordPress 실행
# 데이터베이스: GitHub 레포 내 _db/wordpress.db (SQLite)
name               = "cp-9d1976d3-wp"
main               = "worker.js"
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat"]

[limits]
cpu_ms = 50000

# ── 캐시 (KV) ────────────────────────────────────────────────────────────────
[[kv_namespaces]]
binding = "CACHE"
id      = "3d2f24765eef448fa539aacc3e9aa65e"

# ── PHP_RUNNER Service Binding ────────────────────────────────────────────────
# php-runner Worker를 Service Binding으로 연결 (즉시 WP 실행)
[[services]]
binding = "PHP_RUNNER"
service = "cp-9d1976d3-wp-php"

# ── 환경변수 ─────────────────────────────────────────────────────────────────
[vars]
SITE_ID      = "9d1976d3-58c0-402a-a50b-ef58d1387986"
GH_OWNER     = "choichoi3227-crypto"
GH_REPO      = "cp-9d1976d3-site-9d1976d3"
GH_PAGES_URL = "https://choichoi3227-crypto.github.io/cp-9d1976d3-site-9d1976d3"

# GITHUB_TOKEN은 secret으로 설정 (wrangler secret put GITHUB_TOKEN)
